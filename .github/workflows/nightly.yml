name: Nightly

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

env:
  DOLT_VERSION: "1.86.1"
  BD_VERSION: "v1.0.0"

jobs:
  linux-review-formulas:
    # Nightly intentionally hard-fails here so a broken subshard still
    # surfaces under the legacy summary check instead of disappearing
    # behind best-effort matrix jobs.
    name: Linux / integration review-formulas (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: review-formulas-basic
            label: basic
            coverprofile: coverage.integration-review-formulas-basic.txt
          - shard: review-formulas-retries
            label: retries
            coverprofile: coverage.integration-review-formulas-retries.txt
          - shard: review-formulas-recovery
            label: recovery
            coverprofile: coverage.integration-review-formulas-recovery.txt
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"
      - name: Install tools
        run: make install-tools
      - name: Run integration review-formulas shard
        run: GO_TEST_COVERPROFILE=${{ matrix.coverprofile }} ./scripts/test-integration-shard ${{ matrix.shard }}
      - name: Upload shard coverage to Codecov
        if: hashFiles(matrix.coverprofile) != ''
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ${{ matrix.coverprofile }}
          flags: integration-review-formulas
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  linux-review-formulas-summary:
    # Preserve the historical nightly check name while the real work runs
    # in parallel review-formulas shards above.
    name: Linux / integration review-formulas
    needs:
      - linux-review-formulas
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Finalize nightly review-formulas result
        env:
          SHARD_RESULT: ${{ needs.linux-review-formulas.result }}
        run: |
          if [[ "${SHARD_RESULT}" != "success" ]]; then
            echo "nightly review-formulas subshards failed" >&2
            exit 1
          fi

  linux-rest-smoke:
    name: Linux / integration rest-smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"
      - name: Install tools
        run: make install-tools
      - name: Run integration rest-smoke shard
        run: make test-integration-rest-smoke-cover
      - name: Upload shard coverage to Codecov
        if: hashFiles('coverage.integration-rest-smoke.txt') != ''
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.integration-rest-smoke.txt
          flags: integration-rest-smoke
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  linux-rest-full:
    name: Linux / integration rest-full
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup-gascity-ubuntu
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"
      - name: Install tools
        run: make install-tools
      - name: Run integration rest-full shard
        run: make test-integration-rest-full-cover
      - name: Upload shard coverage to Codecov
        if: hashFiles('coverage.integration-rest-full.txt') != ''
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.integration-rest-full.txt
          flags: integration-rest-full
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  inference:
    name: Tier C inference tests
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_BASE_URL: https://api.synthetic.new/anthropic
      ANTHROPIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.SYNTHETIC_API_KEY }}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_HAIKU_MODEL }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_SONNET_MODEL }}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_OPUS_MODEL }}
      CLAUDE_CODE_SUBAGENT_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_SUBAGENT_MODEL }}
      CLAUDE_CODE_EFFORT_LEVEL: auto
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25.8"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux jq

      - name: Install dolt
        run: |
          curl -fsSL https://github.com/dolthub/dolt/releases/download/v${{ env.DOLT_VERSION }}/install.sh | sudo bash

      - name: Install released bd v${{ env.BD_VERSION }}
        run: |
          archive="beads_${BD_VERSION#v}_linux_amd64.tar.gz"
          mkdir -p "$RUNNER_TEMP/beads"
          curl -fsSL -o "$RUNNER_TEMP/$archive" \
            "https://github.com/gastownhall/beads/releases/download/${BD_VERSION}/${archive}"
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/beads" bd
          sudo install -m 0755 "$RUNNER_TEMP/beads/bd" /usr/local/bin/bd

      - name: Validate Synthetic Claude configuration
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "Missing SYNTHETIC_API_KEY GitHub secret" >&2; exit 1; }
          test -n "$ANTHROPIC_AUTH_TOKEN" || { echo "Missing SYNTHETIC_API_KEY GitHub secret" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_HAIKU_MODEL" || { echo "ANTHROPIC_DEFAULT_HAIKU_MODEL resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_SONNET_MODEL" || { echo "ANTHROPIC_DEFAULT_SONNET_MODEL resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_OPUS_MODEL" || { echo "ANTHROPIC_DEFAULT_OPUS_MODEL resolved empty" >&2; exit 1; }
          test -n "$CLAUDE_CODE_SUBAGENT_MODEL" || { echo "CLAUDE_CODE_SUBAGENT_MODEL resolved empty" >&2; exit 1; }
          printf 'ANTHROPIC_BASE_URL=%s\n' "$ANTHROPIC_BASE_URL"
          printf 'ANTHROPIC_DEFAULT_HAIKU_MODEL=%s\n' "$ANTHROPIC_DEFAULT_HAIKU_MODEL"
          printf 'ANTHROPIC_DEFAULT_SONNET_MODEL=%s\n' "$ANTHROPIC_DEFAULT_SONNET_MODEL"
          printf 'ANTHROPIC_DEFAULT_OPUS_MODEL=%s\n' "$ANTHROPIC_DEFAULT_OPUS_MODEL"
          printf 'CLAUDE_CODE_SUBAGENT_MODEL=%s\n' "$CLAUDE_CODE_SUBAGENT_MODEL"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Tier B acceptance tests
        run: make test-acceptance-b

      - name: Tier C inference tests
        run: make test-acceptance-c

  mac-inference:
    name: Mac / Tier B+C inference tests
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - macstadium
    timeout-minutes: 180
    env:
      ANTHROPIC_BASE_URL: https://api.synthetic.new/anthropic
      ANTHROPIC_API_KEY: ${{ secrets.SYNTHETIC_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.SYNTHETIC_API_KEY }}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_HAIKU_MODEL }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_SONNET_MODEL }}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_OPUS_MODEL }}
      CLAUDE_CODE_SUBAGENT_MODEL: ${{ vars.GC_WORKER_INFERENCE_CLAUDE_SYNTHETIC_SUBAGENT_MODEL }}
      CLAUDE_CODE_EFFORT_LEVEL: auto
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-gascity-macos
        with:
          dolt-version: ${{ env.DOLT_VERSION }}
          bd-version: ${{ env.BD_VERSION }}
          install-claude-cli: "true"

      - name: Validate Synthetic Claude configuration
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "Missing SYNTHETIC_API_KEY GitHub secret" >&2; exit 1; }
          test -n "$ANTHROPIC_AUTH_TOKEN" || { echo "Missing SYNTHETIC_API_KEY GitHub secret" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_HAIKU_MODEL" || { echo "ANTHROPIC_DEFAULT_HAIKU_MODEL resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_SONNET_MODEL" || { echo "ANTHROPIC_DEFAULT_SONNET_MODEL resolved empty" >&2; exit 1; }
          test -n "$ANTHROPIC_DEFAULT_OPUS_MODEL" || { echo "ANTHROPIC_DEFAULT_OPUS_MODEL resolved empty" >&2; exit 1; }
          test -n "$CLAUDE_CODE_SUBAGENT_MODEL" || { echo "CLAUDE_CODE_SUBAGENT_MODEL resolved empty" >&2; exit 1; }

      - name: Tier B acceptance tests
        run: make test-acceptance-b

      - name: Tier C inference tests
        run: make test-acceptance-c
